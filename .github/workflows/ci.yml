name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test-${{ matrix.pg }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    env:
      CARGO_TERM_COLOR: always
      PGRX_HOME: ${{ github.workspace }}/.pgrx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Intentionally do not use `nix develop` in GitHub Actions. We hit
      # linker failures building this extension/V8 with the Nix toolchain on
      # GitHub's Ubuntu runners, and upstream `pgrx` notes that nixpkgs
      # support is still in flux:
      # https://github.com/pgcentralfoundation/pgrx/blob/v0.17.0/README.md#cross-compiling
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            libclang-dev \
            libclang-19-dev \
            libglib2.0-dev \
            pkg-config \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            libxml2-dev \
            libxslt-dev \
            libssl-dev \
            libxml2-utils \
            xsltproc \
            ccache \
            libicu-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Install just
        run: cargo install --locked just

      - name: Initialize pgrx (pg${{ matrix.pg }})
        run: cargo pgrx init "--pg${{ matrix.pg }}" download

      - name: Cargo check (pg${{ matrix.pg }})
        run: cargo check --no-default-features --features "pg${{ matrix.pg }}"

      - name: Run tests (pg${{ matrix.pg }})
        env:
          RUSTFLAGS: -Clink-self-contained=no -Clinker-features=-lld
        run: cargo pgrx test "pg${{ matrix.pg }}"

      - name: Run regress (pg${{ matrix.pg }})
        env:
          RUSTFLAGS: -Clink-self-contained=no -Clinker-features=-lld
        run: just regress "pg${{ matrix.pg }}"
