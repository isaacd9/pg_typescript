name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test-${{ matrix.pg }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: ubuntu-24.04
            pg: 16
          - arch: x64
            runs_on: ubuntu-24.04
            pg: 17
          - arch: x64
            runs_on: ubuntu-24.04
            pg: 18
          - arch: arm64
            runs_on: ubuntu-24.04-arm
            pg: 16
          - arch: arm64
            runs_on: ubuntu-24.04-arm
            pg: 17
          - arch: arm64
            runs_on: ubuntu-24.04-arm
            pg: 18
    env:
      CARGO_TERM_COLOR: always
      PGRX_HOME: ${{ github.workspace }}/.pgrx
      NIX_CONFIG: experimental-features = nix-command flakes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Initialize pgrx (pg${{ matrix.pg }})
        run: nix develop -c cargo pgrx init "--pg${{ matrix.pg }}" download

      - name: Cargo check (pg${{ matrix.pg }})
        run: nix develop -c cargo check --no-default-features --features "pg${{ matrix.pg }}"

      - name: Run tests (pg${{ matrix.pg }})
        run: nix develop -c cargo pgrx test "pg${{ matrix.pg }}"

      - name: Run regress (pg${{ matrix.pg }})
        run: nix develop -c just regress "pg${{ matrix.pg }}"
