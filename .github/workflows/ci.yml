name: CI

on:
    push:
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

env:
    RUSTY_V8_REPOSITORY: denoland/rusty_v8
    # Matches the v8 = 145.0.0 crate used by deno_core 0.386.0.
    RUSTY_V8_REF: v145.0.0

jobs:
    build-v8:
        name: build-v8-${{ matrix.target }}
        runs-on: ubuntu-24.04
        env:
            V8_FROM_SOURCE: true
            # Build a V8 static archive that can be linked into a PG extension .so.
            GN_ARGS: is_component_build=false v8_monolithic=true v8_monolithic_for_shared_library=true
            SCCACHE_GHA_ENABLED: "true"
            SCCACHE_CACHE_SIZE: 3G
            RUSTC_WRAPPER: sccache
        strategy:
            fail-fast: false
            matrix:
                target:
                    - x86_64-unknown-linux-gnu
                    - aarch64-unknown-linux-gnu

        steps:
            - name: Configure git
              run: git config --global core.symlinks true

            - name: Checkout rusty_v8
              uses: actions/checkout@v4
              with:
                  repository: ${{ env.RUSTY_V8_REPOSITORY }}
                  ref: ${{ env.RUSTY_V8_REF }}
                  path: rusty_v8
                  submodules: recursive

            - name: Install Nix
              uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

            - name: Restore Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: |
                      rusty_v8
                  shared-key: v8-prebuilt-${{ matrix.target }}-${{ env.RUSTY_V8_REF }}

            - name: Set up sccache
              uses: mozilla-actions/sccache-action@v0.0.9

            - name: Install Python
              uses: actions/setup-python@v5
              with:
                  python-version: 3.11.x
                  architecture: x64

            - name: Install Linux build dependencies
              run: |
                  sudo apt update
                  sudo apt install -yq --no-install-suggests --no-install-recommends \
                    binutils bison curl flex git libglib2.0-dev libicu-dev \
                    libreadline-dev libssl-dev libxml2-dev libxslt1-dev make \
                    ninja-build perl pkg-config zlib1g-dev

            - name: Install cross compilation toolchain
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt install -yq --no-install-suggests --no-install-recommends \
                    binfmt-support g++-10-aarch64-linux-gnu g++-10-multilib \
                    gcc-10-aarch64-linux-gnu libc6-arm64-cross qemu-user \
                    qemu-user-binfmt

                  if [ ! -e /lib/ld-linux-aarch64.so.1 ]; then
                    sudo ln -s /usr/aarch64-linux-gnu/lib/ld-linux-aarch64.so.1 \
                      /lib/ld-linux-aarch64.so.1
                  fi

                  echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=/usr/bin/aarch64-linux-gnu-gcc-10" >> "$GITHUB_ENV"
                  echo "QEMU_LD_PREFIX=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"

            - name: Install Clang
              run: |
                  echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo dd of=/etc/apt/sources.list.d/llvm-toolchain-noble-19.list
                  curl https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor | sudo dd of=/etc/apt/trusted.gpg.d/llvm-snapshot.gpg
                  sudo apt-get update
                  sudo apt-get -qq remove 'clang-*'
                  sudo apt-get install -y lld-19 clang-19 clang-tools-19 clang-tidy-19 clang-format-19 libclang-19-dev
                  echo "LIBCLANG_PATH=/usr/lib/llvm-19/lib" >> "$GITHUB_ENV"

            - name: Enable unprivileged user namespaces (needed by bubblewrap/buildFHSEnv)
              run: |
                  sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

            - name: Build custom rusty_v8 prebuilt
              env:
                  V8_TARGET: ${{ matrix.target }}
                  RUSTY_V8_TARGET_DIR: ${{ runner.temp }}/rusty_v8-target
                  RUSTY_V8_ARTIFACT_DIR: ${{ runner.temp }}/rusty-v8
              run: |
                  set -euo pipefail
                  export CARGO_TARGET_DIR="$RUSTY_V8_TARGET_DIR"

                  cargo build --manifest-path "$GITHUB_WORKSPACE/rusty_v8/Cargo.toml" --release --target "$V8_TARGET"

                  mkdir -p "$CARGO_TARGET_DIR/$V8_TARGET/release/gn_out"
                  mkdir -p "$RUSTY_V8_ARTIFACT_DIR/$V8_TARGET"
                  cp "$CARGO_TARGET_DIR/$V8_TARGET/release/gn_out/obj/librusty_v8.a" "$RUSTY_V8_ARTIFACT_DIR/$V8_TARGET/librusty_v8.a"
                  cp "$CARGO_TARGET_DIR/$V8_TARGET/release/gn_out/src_binding.rs" "$RUSTY_V8_ARTIFACT_DIR/$V8_TARGET/src_binding.rs"

            - name: Upload custom rusty_v8 prebuilt
              uses: actions/upload-artifact@v4
              with:
                  name: rusty-v8-${{ matrix.target }}
                  path: ${{ runner.temp }}/rusty-v8/${{ matrix.target }}
                  if-no-files-found: error
                  retention-days: 7

            - name: Show sccache stats
              if: always()
              run: ${SCCACHE_PATH} --show-stats

    test:
        name: test-${{ matrix.pg }}-${{ matrix.arch }}
        needs: build-v8
        runs-on: ${{ matrix.runs_on }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: x86_64
                      runs_on: ubuntu-24.04
                      pg: 16
                      v8_target: x86_64-unknown-linux-gnu
                    - arch: x86_64
                      runs_on: ubuntu-24.04
                      pg: 17
                      v8_target: x86_64-unknown-linux-gnu
                    - arch: x86_64
                      runs_on: ubuntu-24.04
                      pg: 18
                      v8_target: x86_64-unknown-linux-gnu
                    - arch: aarch64
                      runs_on: ubuntu-24.04-arm
                      pg: 16
                      v8_target: aarch64-unknown-linux-gnu
                    - arch: aarch64
                      runs_on: ubuntu-24.04-arm
                      pg: 17
                      v8_target: aarch64-unknown-linux-gnu
                    - arch: aarch64
                      runs_on: ubuntu-24.04-arm
                      pg: 18
                      v8_target: aarch64-unknown-linux-gnu
        env:
            CARGO_TERM_COLOR: always
            PGRX_HOME: ${{ github.workspace }}/pg_deno/.pgrx
            NIX_CONFIG: experimental-features = nix-command flakes

        steps:
            - name: Checkout pg_deno
              uses: actions/checkout@v4
              with:
                  path: pg_deno

            - name: Download Linux V8 prebuilt
              uses: actions/download-artifact@v4
              with:
                  name: rusty-v8-${{ matrix.v8_target }}
                  path: pg_deno/.rusty_v8-prebuilt/${{ matrix.v8_target }}

            - name: Install Nix
              uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - name: Initialize pgrx (pg${{ matrix.pg }})
              working-directory: pg_deno
              run: nix develop -c cargo pgrx init "--pg${{ matrix.pg }}" download

            - name: Cargo check (pg${{ matrix.pg }})
              working-directory: pg_deno
              run: nix develop -c cargo check --no-default-features --features "pg${{ matrix.pg }}"

            - name: Run tests (pg${{ matrix.pg }})
              working-directory: pg_deno
              run: nix develop -c cargo pgrx test "pg${{ matrix.pg }}"

            - name: Run regress (pg${{ matrix.pg }})
              working-directory: pg_deno
              run: nix develop -c just regress "pg${{ matrix.pg }}"
